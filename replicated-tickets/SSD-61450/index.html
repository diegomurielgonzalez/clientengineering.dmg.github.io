<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glia Left-Aligned Native Bubble Mockup</title>

    <script async src="https://api.glia.com/salemove_integration.js"></script>

    <style>
        /* General page styling for the mock site */
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background-color: #f4f7f6;
            color: #333;
        }

        /* * 1. UNIVERSAL LEFT ALIGNMENT FOR ALL SCREEN SIZES
        * Target ONLY the outermost positioning wrappers and detach them from 
        * Glia's native right-aligned desktop container using position: fixed.
        * (We do not target .sm-visitor-app, keeping native padding intact)
        */
        #salemove .sm-touch-draggable-lower-right,
        #salemove .sm-touch-draggable-placeholder {
            position: fixed !important;
            left: 30px !important;
            right: auto !important;
            bottom: 30px !important;
            transform: none !important; /* Neutralizes Glia's dynamic JS sliding animations */
        }

        /* * 2. MOBILE RESPONSIVENESS
        * Adjust margins for small screens and cap the maximum width of the open layout 
        * so it doesn't bleed off the right edge of a mobile device.
        */
        @media (max-width: 768px) {
            #salemove .sm-touch-draggable-lower-right,
            #salemove .sm-touch-draggable-placeholder {
                left: 20px !important;
                bottom: 20px !important;
            }
            
            #salemove .sm-touch-draggable-placeholder {
                max-width: calc(100vw - 40px) !important;
            }
        }
    </style>
</head>
<body>

    <h1>Welcome to the Mock Site</h1>
    <p>Notice the native Glia contact bubble securely anchored to the bottom left.</p>
    <p>By using standard CSS overrides, we no longer need custom JavaScript or HTML buttons.</p>

</body>
</html>
