<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glia Left-Aligned Native Bubble Mockup</title>

    <script async src="https://api.glia.com/salemove_integration.js"></script>

</head>
<body>

    <h1>Welcome to the Mock Site</h1>
    <p>Notice the native Glia contact bubble securely anchored to the bottom left.</p>
    <p>By using standard CSS overrides, we no longer need custom JavaScript or HTML buttons.</p>
    <script>
        (function() {
            'use strict';

            // ── CONFIG ──────────────────────────────────────────────
            var LEFT_DESKTOP = '30px';
            var BOTTOM_DESKTOP = '30px';
            var LEFT_MOBILE = '20px';
            var BOTTOM_MOBILE = '20px';
            var MOBILE_BREAKPOINT = 768;
            var PANEL_MAX_WIDTH = '400px';

            // ── 1. INJECT CSS LAST (wins over Glia's late-loaded sheets) ──
            function injectOverrideCSS() {
                // Remove any previously injected override to avoid duplicates
                var existing = document.querySelector('style[data-glia-left-override]');
                if (existing) existing.remove();

                var style = document.createElement('style');
                style.setAttribute('data-glia-left-override', 'true');
                style.textContent = [
                    '/* Neutralize the outer container */',
                    '#salemove #sm-visitor-app-container {',
                    '  position: fixed !important;',
                    '  top: 0 !important;',
                    '  left: 0 !important;',
                    '  right: auto !important;',
                    '  width: 0 !important;',
                    '  height: 0 !important;',
                    '  overflow: visible !important;',
                    '  display: block !important;',
                    '  pointer-events: none !important;',
                    '}',
                    '#salemove #sm-visitor-app-container * {',
                    '  pointer-events: auto;',
                    '}',
                    '',
                    '/* Position the draggable wrappers */',
                    '#salemove .sm-touch-draggable-lower-right,',
                    '#salemove .sm-touch-draggable-placeholder {',
                    '  position: fixed !important;',
                    '  left: ' + LEFT_DESKTOP + ' !important;',
                    '  right: auto !important;',
                    '  bottom: ' + BOTTOM_DESKTOP + ' !important;',
                    '  top: auto !important;',
                    '  transform: none !important;',
                    '  will-change: auto !important;',
                    '  margin: 0 !important;',
                    '  inset-inline-end: auto !important;',
                    '  inset-inline-start: ' + LEFT_DESKTOP + ' !important;',
                    '}',
                    '#salemove .sm-touch-draggable-placeholder {',
                    '  max-width: ' + PANEL_MAX_WIDTH + ' !important;',
                    '}',
                    '',
                    '/* Mobile overrides */',
                    '@media (max-width: ' + MOBILE_BREAKPOINT + 'px) {',
                    '  #salemove .sm-touch-draggable-lower-right,',
                    '  #salemove .sm-touch-draggable-placeholder {',
                    '    left: ' + LEFT_MOBILE + ' !important;',
                    '    bottom: ' + BOTTOM_MOBILE + ' !important;',
                    '    inset-inline-start: ' + LEFT_MOBILE + ' !important;',
                    '  }',
                    '  #salemove .sm-touch-draggable-placeholder {',
                    '    max-width: calc(100vw - 40px) !important;',
                    '  }',
                    '}'
                ].join('\n');
                document.head.appendChild(style);
            }

            // ── 2. FORCE INLINE STYLES (beats Glia's JS inline overrides) ──
            function forceLeftPosition(el) {
                if (!el || !el.style) return;
                var isMobile = window.innerWidth <= MOBILE_BREAKPOINT;
                var leftVal = isMobile ? LEFT_MOBILE : LEFT_DESKTOP;
                var bottomVal = isMobile ? BOTTOM_MOBILE : BOTTOM_DESKTOP;

                el.style.setProperty('left', leftVal, 'important');
                el.style.setProperty('right', 'auto', 'important');
                el.style.setProperty('bottom', bottomVal, 'important');
                el.style.setProperty('top', 'auto', 'important');
                el.style.setProperty('transform', 'none', 'important');
                el.style.setProperty('will-change', 'auto', 'important');
                el.style.setProperty('position', 'fixed', 'important');
            }

            function forceAllTargets() {
                var selectors = [
                    '.sm-touch-draggable-lower-right',
                    '.sm-touch-draggable-placeholder'
                ];
                selectors.forEach(function(sel) {
                    var els = document.querySelectorAll('#salemove ' + sel);
                    els.forEach(forceLeftPosition);
                });

                // Also neutralize the container
                var container = document.getElementById('sm-visitor-app-container');
                if (container) {
                    container.style.setProperty('position', 'fixed', 'important');
                    container.style.setProperty('left', '0', 'important');
                    container.style.setProperty('right', 'auto', 'important');
                    container.style.setProperty('width', '0', 'important');
                    container.style.setProperty('height', '0', 'important');
                    container.style.setProperty('overflow', 'visible', 'important');
                    container.style.setProperty('display', 'block', 'important');
                    container.style.setProperty('pointer-events', 'none', 'important');
                }
            }

            // ── 3. WAIT FOR #salemove TO APPEAR, THEN OBSERVE ──
            function startObserving() {
                var salemove = document.getElementById('salemove');
                if (salemove) {
                    attachObserver(salemove);
                    return;
                }

                // #salemove doesn't exist yet — watch <body> for it to be injected
                var bodyObserver = new MutationObserver(function(mutations) {
                    var el = document.getElementById('salemove');
                    if (el) {
                        bodyObserver.disconnect();
                        attachObserver(el);
                    }
                });
                bodyObserver.observe(document.body, { childList: true, subtree: true });
            }

            function attachObserver(salemoveEl) {
                // Initial pass — force positions immediately
                forceAllTargets();

                // Re-inject CSS to ensure it's the LAST stylesheet in <head>
                injectOverrideCSS();

                var observer = new MutationObserver(function(mutations) {
                    var needsUpdate = false;
                    mutations.forEach(function(m) {
                        // Style or class changes on target elements
                        if (m.type === 'attributes') {
                            var el = m.target;
                            if (el.classList &&
                                (el.classList.contains('sm-touch-draggable-lower-right') ||
                                el.classList.contains('sm-touch-draggable-placeholder') ||
                                el.id === 'sm-visitor-app-container')) {
                                needsUpdate = true;
                            }
                        }
                        // New child nodes (Glia rebuilds parts of the DOM on interaction)
                        if (m.type === 'childList' && m.addedNodes.length > 0) {
                            needsUpdate = true;
                        }
                    });
                    if (needsUpdate) {
                        // Use requestAnimationFrame to apply AFTER Glia's JS finishes its update
                        requestAnimationFrame(forceAllTargets);
                    }
                });

                observer.observe(salemoveEl, {
                    attributes: true,
                    attributeFilter: ['style', 'class'],
                    childList: true,
                    subtree: true
                });

                // Re-force on window resize (mobile <-> desktop transitions)
                window.addEventListener('resize', forceAllTargets);
            }

            // ── BOOT ──
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', startObserving);
            } else {
                startObserving();
            }
        })();
        </script>
</body>
</html>
