<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glia Left-Aligned Native Bubble Mockup</title>

    <script async src="https://api.glia.com/salemove_integration.js"></script>

    <style>
        /* ============================================================
        GLIA LEFT-ALIGNMENT — FULL FIX (ALL SCREEN SIZES)
        ============================================================ */

        /* 
        * 0. NEUTRALIZE THE OUTER CONTAINER
        * #sm-visitor-app-container is a full-viewport overlay that uses
        * flexbox (justify-content: flex-end) or absolute right positioning.
        * We must disable its right-alignment so children can float left.
        */
        #salemove #sm-visitor-app-container {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: auto !important;
            width: auto !important;
            height: auto !important;
            display: block !important;           /* kills flex/grid right-alignment */
            pointer-events: none !important;     /* pass clicks through to page */
        }

        /* Re-enable pointer events on the actual widget */
        #salemove #sm-visitor-app-container * {
            pointer-events: auto;
        }

        /* 
        * 1. UNIVERSAL LEFT ALIGNMENT FOR ALL SCREEN SIZES
        * Now that the container is neutralized, position the wrappers.
        */
        #salemove .sm-touch-draggable-lower-right,
        #salemove .sm-touch-draggable-placeholder {
            position: fixed !important;
            left: 30px !important;
            right: auto !important;
            bottom: 30px !important;
            top: auto !important;
            transform: none !important;
            will-change: auto !important;        /* prevent Glia from re-enabling GPU transforms */
        }

        /* 
        * 2. PREVENT INLINE JS VARIABLE OVERRIDES
        * Glia sometimes injects --horizontal-offset or similar custom properties.
        * Force the relevant properties to ignore those variables.
        */
        #salemove .sm-touch-draggable-lower-right,
        #salemove .sm-touch-draggable-placeholder {
            margin-right: 0 !important;
            margin-left: 0 !important;
            inset-inline-end: auto !important;
            inset-inline-start: 30px !important;
        }

        /* 
        * 3. ENGAGEMENT PANEL (OPEN STATE)
        * When the bubble opens into the media-selection dialog, it uses
        * .sm-touch-draggable-placeholder. Cap its width so it doesn't
        * stretch full-screen on desktop.
        */
        #salemove .sm-touch-draggable-placeholder {
            max-width: 400px !important;         /* matches Glia's native panel width */
        }

        /* 
        * 4. MOBILE RESPONSIVENESS
        */
        @media (max-width: 768px) {
            #salemove .sm-touch-draggable-lower-right,
            #salemove .sm-touch-draggable-placeholder {
                left: 20px !important;
                bottom: 20px !important;
                inset-inline-start: 20px !important;
            }

            #salemove .sm-touch-draggable-placeholder {
                max-width: calc(100vw - 40px) !important;
            }
        }

    </style>
</head>
<body>

    <h1>Welcome to the Mock Site</h1>
    <p>Notice the native Glia contact bubble securely anchored to the bottom left.</p>
    <p>By using standard CSS overrides, we no longer need custom JavaScript or HTML buttons.</p>
    <script>
        // Optional: Strip inline positioning Glia re-injects on desktop
        const observer = new MutationObserver((mutations) => {
        mutations.forEach((m) => {
            if (m.type === 'attributes' && m.attributeName === 'style') {
            const el = m.target;
            if (el.classList.contains('sm-touch-draggable-lower-right') ||
                el.classList.contains('sm-touch-draggable-placeholder')) {
                el.style.removeProperty('right');
                el.style.removeProperty('transform');
            }
            }
        });
        });

        const salemove = document.getElementById('salemove');
        if (salemove) {
        observer.observe(salemove, { attributes: true, subtree: true, attributeFilter: ['style'] });
        }
    </script>
</body>
</html>
