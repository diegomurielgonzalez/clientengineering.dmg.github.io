<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glia Left-Aligned Bubble</title>
    <script async src="https://api.glia.com/salemove_integration.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background-color: #f4f7f6;
            color: #333;
        }


        /* Custom left-aligned bubble */
        .glia-left-bubble {
            position: fixed;
            left: 30px;
            bottom: 30px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: #53a0fd;
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999999;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .glia-left-bubble:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .glia-left-bubble svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        @media (max-width: 768px) {
            .glia-left-bubble {
                left: 20px;
                bottom: 20px;
                width: 48px;
                height: 48px;
            }
        }

        /* Move the media selection panel (alertdialog) to the left */
        #salemove .sm-touch-draggable-placeholder {
            position: fixed !important;
            left: 30px !important;
            right: auto !important;
            bottom: 30px !important;
            transform: none !important;
        }
        @media (max-width: 768px) {
            #salemove .sm-touch-draggable-placeholder {
                left: 20px !important;
                bottom: 20px !important;
                max-width: calc(100vw - 40px) !important;
            }
        }
    </style>
</head>
<body>
    <h1>Welcome to the Mock Site</h1>
    <p>The Glia bubble is anchored to the bottom left.</p>

    <!-- This is all you need — Glia handles everything on click -->
    <button class="glia-left-bubble"
            data-sm-show-media-selection-on="click"
            aria-label="Let's talk!">
        <svg viewBox="0 0 20 20">
            <path d="M11.6,3.7H8.4c-2.6,0-4.7,1.8-5,4.2c-0.2,1.4,0.2,2.8,1.2,3.8c0.9,1,2.2,1.6,3.6,1.6h1.5l0.1,0.1l2.8,2.8v-2.9l0.3-0.1c2.4-0.6,4-2.8,3.7-5.2C16.4,5.6,14.2,3.7,11.6,3.7z"/>
        </svg>
    </button>
</body>
</html>
