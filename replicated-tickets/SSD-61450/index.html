<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glia Left-Aligned Native Bubble Mockup</title>

    <script async src="https://api.glia.com/salemove_integration.js"></script>

    <style>
        /* General page styling for the mock site */
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background-color: #f4f7f6;
            color: #333;
        }

        /* * 1. UNIVERSAL LEFT ALIGNMENT 
         * Targets both the native bubble wrapper and the open panel.
         * Using !important ensures this wins out across desktop, tablet, and mobile.
         */
        .salemove .sm-touch-draggable-lower-right,
        .salemove .sm-touch-draggable-placeholder,
        .salemove .sm-visitor-app {
            position: fixed !important;
            left: 30px !important;
            right: auto !important;
            bottom: 30px !important;
            transform: none !important; /* Neutralizes Glia's dynamic JS positioning */
        }

        /* * 2. MOBILE & NARROW SCREEN MARGINS 
         * Adjusts the distance from the edge slightly on smaller devices.
         */
        @media (max-width: 768px) {
            .salemove .sm-touch-draggable-lower-right,
            .salemove .sm-touch-draggable-placeholder,
            .salemove .sm-visitor-app {
                left: 20px !important;
                bottom: 20px !important;
            }
            
            /* * 3. WIDTH CONSTRAINT (OPEN PANEL ONLY)
             * Restricts the open chat window from bleeding off the screen.
             * We do NOT apply this to the bubble wrapper to avoid a stretched clickbox.
             */
            .salemove .sm-visitor-app {
                width: calc(100vw - 40px) !important;
                max-width: 380px !important;
            }
        }
    </style>
</head>
<body>

    <h1>Welcome to the Mock Site</h1>
    <p>Notice the native Glia contact bubble securely anchored to the bottom left.</p>
    <p>By using standard CSS overrides, we no longer need custom JavaScript or HTML buttons.</p>

</body>
</html>
