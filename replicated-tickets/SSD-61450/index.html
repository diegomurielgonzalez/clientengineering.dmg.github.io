<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glia Left-Aligned Native Bubble Mockup</title>

    <script async src="https://api.glia.com/salemove_integration.js"></script>

    <style>
        /* General page styling for the mock site */
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background-color: #f4f7f6;
            color: #333;
        }

        /* * 1. UNIVERSAL LEFT ALIGNMENT FOR ALL SCREEN SIZES
        * Target ONLY the outermost positioning wrappers.
        * .sm-touch-draggable-lower-right = The closed bubble
        * .sm-touch-draggable-placeholder = The open engagement layout
        */
        .salemove .sm-touch-draggable-lower-right,
        .salemove .sm-touch-draggable-placeholder {
            left: 20px !important;
            right: auto !important;
            transform: none !important; /* Neutralizes Glia's dynamic JS sliding animations */
        }

        /* * 2. MOBILE OVERFLOW PREVENTION (OPEN LAYOUT ONLY)
        * Because we shifted the entire layout 20px from the left, we must cap its 
        * maximum width on mobile screens so it does not bleed off the right edge.
        * We apply this ONLY to the open layout wrapper, leaving the bubble itself alone.
        */
        .sm-mobile .salemove .sm-touch-draggable-placeholder {
            max-width: calc(100vw - 40px) !important;
        }
    </style>
</head>
<body>

    <h1>Welcome to the Mock Site</h1>
    <p>Notice the native Glia contact bubble securely anchored to the bottom left.</p>
    <p>By using standard CSS overrides, we no longer need custom JavaScript or HTML buttons.</p>

</body>
</html>
