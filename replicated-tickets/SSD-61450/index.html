<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glia Left-Aligned Native Bubble Mockup</title>

    <script async src="https://api.glia.com/salemove_integration.js"></script>

    <style>
        /* General page styling for the mock site */
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background-color: #f4f7f6;
            color: #333;
        }

        /* * 1. UNIVERSAL LEFT ALIGNMENT 
        * Target ONLY the outermost draggable wrappers to move the unit.
        * We specifically removed .sm-visitor-app from this rule so it 
        * retains Glia's native internal padding and drop shadows.
        */
        .salemove .sm-touch-draggable-lower-right,
        .salemove .sm-touch-draggable-placeholder {
            position: fixed !important;
            left: 20px !important;
            right: auto !important;
            bottom: 20px !important;
            transform: none !important; /* Neutralizes Glia's dynamic JS positioning */
        }

        /* * 2. MOBILE OVERFLOW PREVENTION
        * On mobile, Glia's panel natively tries to stretch to the full screen width.
        * Because we anchored it 20px from the left, we just cap the max-width 
        * so it doesn't bleed off the right side of the phone screen.
        */
        @media (max-width: 768px) {
            .salemove .sm-visitor-app {
                max-width: calc(100vw - 40px) !important;
            }
        }
    </style>
</head>
<body>

    <h1>Welcome to the Mock Site</h1>
    <p>Notice the native Glia contact bubble securely anchored to the bottom left.</p>
    <p>By using standard CSS overrides, we no longer need custom JavaScript or HTML buttons.</p>

</body>
</html>
