<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glia SPA Modal Bug Simulator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        nav { background-color: #333; padding: 15px; color: white; border-radius: 5px; }
        nav button { background: transparent; color: white; border: 1px solid white; padding: 8px 15px; margin-right: 10px; cursor: pointer; border-radius: 4px; }
        nav button:hover { background: white; color: #333; }
        #main-content { padding: 20px; background: white; border-radius: 8px; margin-top: 20px; min-height: 200px; }
        
        /* The Fixed Bottom Modal */
        .bottom-modal {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 300px;
            background-color: #ffeb3b;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        /* Mock Glia Bubble */
        #mock-glia-bubble {
            position: fixed;
            bottom: 20px; /* Default position */
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: #007bff;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: bottom 0.3s ease; /* Smooth animation */
            z-index: 99;
        }

        /* The CSS class the Glia Web Rule applies */
        .bubble-moved-up {
            bottom: 320px !important; 
        }
    </style>
</head>
<body>

    <nav>
        <strong>SPA Router:</strong>
        <button onclick="navigate('/')">Home</button>
        <button onclick="navigate('/subdomain1/auth')">Go to Auth</button>
        <button onclick="navigate('/subdomain1/info')">Go to Info</button>
    </nav>

    <div id="main-content">
        <h2>Welcome</h2>
        <p>Go to Auth to test the modal.</p>
    </div>

    <div id="mock-glia-bubble">Chat</div>

    <script>
        const bubble = document.getElementById('mock-glia-bubble');

        // SPA Router
        function navigate(path) {
            window.history.pushState({ path: path }, '', path);
            renderContent(path);
        }

        function renderContent(path) {
            const mainContent = document.getElementById('main-content');
            
            if (path.includes('/auth')) {
                mainContent.innerHTML = `
                    <h2>Authentication Page</h2>
                    <button id="auth-btn" style="padding: 10px; cursor: pointer;">Open Auth Modal</button>
                `;
                
                // Attach event listener to the newly rendered button
                document.getElementById('auth-btn').addEventListener('click', openModal);
            } else if (path.includes('/info')) {
                mainContent.innerHTML = `<h2>User Info Page</h2><p>You navigated away without closing the modal.</p>`;
                // THE BUG: The React router destroys the modal from the DOM here, 
                // but no script tells the bubble to move back down.
                removeModalIfItExists();
            } else {
                mainContent.innerHTML = `<h2>Welcome</h2><p>Click the buttons above to navigate.</p>`;
                removeModalIfItExists();
            }
        }

        function openModal() {
            // 1. Create the fixed modal
            const modal = document.createElement('div');
            modal.id = 'auth-modal';
            modal.classList.add('bottom-modal');
            modal.innerHTML = `
                <h3>Please Authenticate</h3>
                <button id="close-modal-btn" style="padding: 10px; cursor: pointer;">Close Modal</button>
            `;
            document.body.appendChild(modal);

            // 2. SIMULATE GLIA WEB RULE: Element Clicked -> Move Bubble Up
            bubble.classList.add('bubble-moved-up');

            // 3. Normal Flow: Close button clicked
            document.getElementById('close-modal-btn').addEventListener('click', () => {
                modal.remove();
                // SIMULATE GLIA WEB RULE: Close Clicked -> Move Bubble Down
                bubble.classList.remove('bubble-moved-up'); 
            });
        }

        function removeModalIfItExists() {
            const modal = document.getElementById('auth-modal');
            if (modal) modal.remove(); // Removes it silently, bypassing the close button
        }
    </script>
</body>
</html>
